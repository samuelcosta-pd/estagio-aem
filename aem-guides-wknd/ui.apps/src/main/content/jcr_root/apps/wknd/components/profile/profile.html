<div
    class="cmp-profile"
    data-sly-use.model="com.adobe.aem.guides.wknd.core.models.ProfileModel">

    <img
        data-sly-test="${model.photo}"
        src="${model.photo}"
        alt="${model.name}">

    <h2 class="cmp-profile__name">
        ${model.name}
    </h2>

    <p
        class="cmp-profile__role"
        data-sly-test="${model.role}">
        ${model.role}
    </p>

    <p class="cmp-profile__bio">
        ${model.bio}
    </p>

</div>
