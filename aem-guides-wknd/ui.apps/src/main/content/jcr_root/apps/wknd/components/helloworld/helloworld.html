<div class="cmp-helloworld"
     data-cmp-is="helloworld"
     data-sly-use.model="com.adobe.aem.guides.wknd.core.models.HelloWorldModel">

    <h2 class="cmp-helloworld__title">
        Meu Primeiro Componente
    </h2>

    <div class="cmp-helloworld__item">

        <h3 class="cmp-helloworld__label">
            Texto
        </h3>

        <p class="cmp-helloworld__content">
            ${properties.text ? properties.text : 'Clique em Editar para adicionar um texto.'}
        </p>

    </div>

    <div class="cmp-helloworld__item">

        <h3 class="cmp-helloworld__label">
            Subtítulo
        </h3>

        <p class="cmp-helloworld__content">
            ${model.subtitle ? model.subtitle : 'Clique em Editar para adicionar um subtítulo.'}
        </p>

    </div>

</div>
